services:
  neo4j:
    image: neo4j:5.26-community
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p '$${NEO4J_PASSWORD}' 'RETURN 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  semantic-query:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ENVIRONMENT: "${ENVIRONMENT:-development}"
      NEO4J_URI: "neo4j://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
      NEO4J_DATABASE: "neo4j"
      API_KEY: "${API_KEY}"
      ADMIN_API_KEY: "${ADMIN_API_KEY}"
      BOOTSTRAP_SCHEMA_ON_STARTUP: "true"
      FAIL_STARTUP_WHEN_NEO4J_UNAVAILABLE: "true"
      STORE_RAW_PROFILE: "false"
    volumes:
      - ./data:/data:ro

volumes:
  neo4j_data:
  neo4j_logs:
